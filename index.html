<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="/css/style.css">
 
    <title>CineFlex Movies</title>
</head>
<body>

    <h1>CineFlex Movies</h1>
    <section id="movies-container"></section>
    <form>
        <label for="category-select">Vælg periode</label>
        <select id="category-select">
            <option value="Alle">Alle</option>
            <option value="Vikingetid">Vikingetid</option>
            <option value="Antikken">Antikken</option>
            <option value="Bronzealder">Bronzealder</option>
            <option value="Jernalder">Jernalder</option>
            <option value="Oldtid">Oldtid</option>
        </select>
    
    
        <label for="gsearch">Søg</label>
        <input type="search" name="gsearch" id="gsearch">
        <input type="submit" value="Søg">
    </form>






    <script src="js/movies-script.js"></script>
</body>
</html>
